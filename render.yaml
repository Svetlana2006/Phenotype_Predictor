services:
  # ------------------------------------
  # 1. FastAPI Backend (Machine Learning)
  # ------------------------------------
  - type: web
    name: phenotype-backend
    env: python
    # We run the command from the root folder so it can access /outputs and /src
    buildCommand: "pip install -e . && pip install fastapi uvicorn"
    startCommand: "PYTHONPATH=.:src uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
    # Machine Learning models require a bit of RAM, starter tier is usually required
    plan: starter

  # ------------------------------------
  # 2. Next.js Dashboard (Frontend)
  # ------------------------------------
  - type: web
    name: phenotype-dashboard
    env: node
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npm run start"
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      # Dynamically connect the frontend to the backend URL that Render creates
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: phenotype-backend
          envVarKey: RENDER_EXTERNAL_URL
