services:
  # ------------------------------------
  # 1. FastAPI Backend (Machine Learning)
  # ------------------------------------
  - type: web
    name: phenotype-backend
    env: python
    # We run the command from the root folder so it can access /outputs and /src
    buildCommand: "python -m pip install --upgrade pip && python -m pip install -e . && python -m pip install -r backend/requirements.txt"
    startCommand: "PYTHONPATH=.:src:backend python -m uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
    # The models are optimized and should fit inside Render's 512MB free tier
    plan: free

  # ------------------------------------
  # 2. Next.js Dashboard (Frontend)
  # ------------------------------------
  - type: web
    name: phenotype-dashboard
    env: node
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npm run start"
    envVars:
      - key: NODE_VERSION
        value: 20.14.0
      # Dynamically connect the frontend to the backend URL that Render creates
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: phenotype-backend
          envVarKey: RENDER_EXTERNAL_URL
